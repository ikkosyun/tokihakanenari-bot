name: Daily Post

on:
  schedule:
    # UTC 15:07 = JST 0:07。GitHub Actionsは「00分ちょうど」のcronに全世界からの
    # 実行が集中して遅延しやすいという既知の傾向があるため、あえて数分ずらしている
    # (このリポジトリでも 0 15 * * * のままだと3〜6時間遅延することが常態化していた)。
    - cron: "7 15 * * *"
  workflow_dispatch: {}  # 手動テスト実行用（Actionsタブから「Run workflow」）

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Japanese font and ffmpeg
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's image
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
        run: python main.py --generate

      - name: Commit and push generated image
        run: |
          git config user.name "tokihakanenari-bot"
          git config user.email "actions@github.com"
          git add docs/images
          git commit -m "Add daily image $(cat docs/images/latest.txt)" || echo "no changes to commit"
          git push

      - name: Wait for GitHub Pages to redeploy
        run: sleep 60

      - name: Publish to Instagram and Slack
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_PAGES_BASE_URL: ${{ vars.GH_PAGES_BASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py --publish

      - name: Commit publish marker
        if: always()
        run: |
          git add docs/images/*.published 2>/dev/null || true
          git commit -m "Mark $(cat docs/images/latest.txt) as published" || echo "no changes to commit"
          git push || echo "nothing to push"
